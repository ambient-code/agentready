# Default Tier-Based Weight Distribution
#
# This file defines the default weights for all 30 attributes.
# Weights are based on evidence from ETH Zurich (Feb 2026), Anthropic,
# Red Hat best practices (April 2026), and Cursor agent guidelines.
#
# Key finding: Verification (tests, lint, CI) has highest impact on
# agent effectiveness. Documentation helps only marginally (+4%).
#
# Tier 1 (Essential):  58% total (9 attributes)
# Tier 2 (Critical):   27% total (10 attributes, mixed weights)
# Tier 3 (Important):  13% total (varies, 8 attributes)
# Tier 4 (Advanced):    2% total (1% each, 2 attributes)
# TOTAL:              100% (sum to 1.0)
#
# Changes in v2.1.0 (ADR: align-with-wg-agentic-sdlc-best-practices):
# - Removed repomix_config (T3, 2%): single-vendor, not universal
# - Removed code_smells (T4, 1%): redundant with complexity/size/SoC
# - Removed concise_documentation (T2, 3%): redundant with length/size
# - Removed branch_protection (T4, stub): always not_applicable
# - Moved design_intent T3 -> T2 (2% -> 3%): BP urgency, agents can't
#   discover why code was designed a certain way
# - Moved progressive_disclosure T4 -> T3 (1% -> 2%): large repos are
#   where agent readiness matters most
# - Redistributed freed 4% to test_execution (+2%) and
#   type_annotations (+2%), the highest-evidence T1 attributes
#
# Changes in v2.2.0 (ADR Proposal B: new assessors):
# - Added architectural_boundaries (T3, 2%): import boundary lint rules
# - Added threat_model (T3, 2%): structured threat model documentation
# - Reduced test_execution (12% -> 11%), architecture_decisions (3% -> 2%),
#   structured_logging (2% -> 1%), openapi_specs (3% -> 2%) to fund new weights
#
# Changes in v2.3.0 (feat/adr-frontmatter-central-repo):
# - Added adr_frontmatter_completeness (T3, 2%): ADR structured-metadata coverage
# - Reduced architecture_decisions (2% -> 1%) to fund new weight
# - Reduced progressive_disclosure (2% -> 1%) to fund new weight
#
# Changes in v2.4.0 (feat/lint-config-coverage, issue #511):
# - Added lint_config_coverage (T2, 2%): lint depth across correctness/standards/security
# - Reduced gitignore_completeness (3% -> 2%) to partially fund new weight
# - Reduced pattern_references (3% -> 2%) to partially fund new weight
#
# Changes in v2.5.0 (feat/lint-suppression-density, issue #510):
# - Added lint_suppression_density (T3, 2%): detects //nolint/# noqa/eslint-disable overuse
# - Reduced cyclomatic_complexity (2% -> 1%) to fund new weight
# - Reduced architectural_boundaries (2% -> 1%) to fund new weight

# Tier 1 (Essential) - 58% total weight
test_execution: 0.11                # 5.1 - Test Execution & Coverage
type_annotations: 0.10              # 3.3 - Type Annotations (structural signals for agents)
agent_instructions: 0.07             # 1.1 - Agent Instruction Files (CLAUDE.md/AGENTS.md)
ci_quality_gates: 0.05              # 16.2 - CI Quality Gates (lint + type-check + tests on PR)
single_file_verification: 0.05      # 16.1 - Single-File Verification (fast feedback loops)
readme_structure: 0.05              # 2.1 - README Structure
standard_layout: 0.05               # 4.1 - Standard Project Layouts
lock_files: 0.05                    # 6.1 - Dependency Pinning for Reproducibility
dependency_security: 0.05           # 6.2 - Dependency Security & Vulnerability Scanning

# Tier 2 (Critical) - 27% total weight
deterministic_enforcement: 0.03     # 5.3 - Hooks & Lint Rules (deterministic > advisory)
conventional_commits: 0.03          # 7.1 - Conventional Commit Messages
gitignore_completeness: 0.02        # 7.2 - .gitignore Completeness (reduced 3%→2%)
one_command_setup: 0.03             # 8.1 - One-Command Build/Setup
inline_documentation: 0.03          # 2.2 - Inline Documentation
file_size_limits: 0.03              # 1.3 - File Size Limits
separation_of_concerns: 0.03        # 4.2 - Separation of Concerns
pattern_references: 0.02            # 17.1 - Pattern References (reduced 3%→2%)
design_intent: 0.03                 # 17.2 - Design Intent Documentation (moved from T3)
lint_config_coverage: 0.02          # 5.4 - Lint Config Coverage (issue #511, new)

# Tier 3 (Important) - 13% total weight (8 attributes)
architecture_decisions: 0.01        # 2.3 - Architecture Decision Records
adr_frontmatter_completeness: 0.02  # 2.4 - ADR Frontmatter Completeness
openapi_specs: 0.02                 # 10.1 - OpenAPI/Swagger Specifications
cyclomatic_complexity: 0.01         # 3.1 - Cyclomatic Complexity Thresholds
structured_logging: 0.01            # 9.2 - Structured Logging
progressive_disclosure: 0.01        # 17.3 - Progressive Disclosure (moved from T4)
architectural_boundaries: 0.01      # B.1 - Architectural Boundary Lint Rules (ADR)
threat_model: 0.02                  # B.2 - Threat Model Documentation (ADR)
lint_suppression_density: 0.02      # B.3 - Lint Suppression Density

# Tier 4 (Advanced) - 2% total weight
issue_pr_templates: 0.01            # 7.3 - Issue & Pull Request Templates
container_setup: 0.01               # 8.3 - Container/Virtualization Setup (conditional)
